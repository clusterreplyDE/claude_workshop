# Complete GitHub Action for Claude Code PR Review
# Place at .github/workflows/claude-review.yml

name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "src/**"
      - "test/**"

# Required permissions
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run tests first
        run: npm test

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR with Claude
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REVIEW=$(claude -p "Review the changes in this pull request.

          Focus on:
          1. Security issues (hardcoded secrets, missing validation)
          2. Logic bugs (edge cases, off-by-one errors)
          3. Best practice violations (HTTP codes, error handling)
          4. Missing or inadequate tests

          Format as markdown with severity indicators:
          🔴 Critical | 🟡 Warning | 🔵 Info

          End with a summary verdict: Pass / Needs Work / Fail" \
            --output-format text \
            --max-budget-usd 1.00 \
            --allowedTools Read,Grep,Glob,Bash)

          # Save review to file for the next step
          echo "$REVIEW" > /tmp/claude-review.md
          echo "review<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Review as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/claude-review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 Claude Code Review\n\n${review}\n\n---\n*Automated review by Claude Code*`
            });
