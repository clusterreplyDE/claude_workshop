# Module 9 Exercise — GitHub Action Template for Claude Code PR Review
# Copy this to .github/workflows/claude-review.yml in your repository

name: Claude Code PR Review

on:
  pull_request:
    types: [opened, synchronize]

# Required permissions for PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better context

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Review PR with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Review the changes in this PR. Focus on:
          1. Security issues
          2. Logic bugs
          3. Best practice violations
          4. Missing tests

          Output a structured review with severity levels." \
            --output-format json \
            --max-budget-usd 1.00 \
            --allowedTools Read,Grep,Glob,Bash

      # Optional: Post review as PR comment
